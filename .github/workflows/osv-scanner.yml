# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up periodic OSV-Scanner scanning for vulnerabilities,
# in addition to a PR check which fails if new vulnerabilities are introduced.
#
# For more examples and options, including how to ignore specific vulnerabilities,
# see https://google.github.io/osv-scanner/github-action/

name: OSV-Scanner

on:
  pull_request:
    branches: [ "main" ]

permissions:
  # Required to upload SARIF file to CodeQL. See: https://github.com/github/codeql-action/issues/2117
  actions: read
  # Require writing security events to upload SARIF file to security tab
  security-events: write
  # Only need to read contents
  contents: read

jobs:
  scan-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # go.mod requires Go >= 1.23.3; the reusable OSV-Scanner workflow uses the
      # runner's default Go (1.22.8) which causes govulncheck to fail with
      # "go.mod requires go >= 1.23.3 (running go 1.22.8; GOTOOLCHAIN=local)".
      # Installing Go 1.23.x here ensures govulncheck can load packages correctly.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.1
        with:
          # Recursively scan the whole repository, skipping git history
          scan-args: |-
            -r
            --skip-git
            ./
